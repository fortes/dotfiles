name: MacOS

on:
  workflow_run:
    workflows: ["Bash Syntax Check & Lint"]
    types:
      - completed

jobs:
  build:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: macos-14

    steps:
      # workflow_run-triggered runs default to checking out the default branch;
      # use the SHA from the originating workflow so we test the actual branch
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Setup machine
        run: bash ./script/setup_mac